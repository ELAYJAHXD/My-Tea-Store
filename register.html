<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Portal - Kanto Tea</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #faf6f0;
            color: #3d2b1f; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .custom-navbar {
            background-color: #2b1e16 !important;
            border-bottom: 3px solid #c68a4c; 
        }

        .custom-navbar .navbar-brand {
            color: #c68a4c !important; 
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .custom-navbar .nav-link {
            color: #faf6f0 !important;
            transition: color 0.2s ease-in-out;
            font-weight: 500;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #c68a4c !important; 
        }

        .custom-toggler-text {
            color: #faf6f0;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #c68a4c;
            padding: 0.25rem 0.7rem;
            border-radius: 4px;
        }

        .portal-bg-wrapper {
            flex: 1;
            background-image: linear-gradient(rgba(43, 30, 22, 0.65), rgba(43, 30, 22, 0.8)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .register-card-layout {
            background-color: rgba(255, 255, 255, 0.94) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 138, 76, 0.3) !important;
            max-width: 680px;
            width: 100%;
        }

        .btn-caramel {
            background-color: #c68a4c;
            color: #ffffff;
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-caramel:hover {
            background-color: #ab733b;
            color: #ffffff;
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-select ~ label {
            color: #c68a4c !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #c68a4c !important;
            box-shadow: 0 0 0 0.25rem rgba(198, 138, 76, 0.25) !important;
        }

        .form-check-input:checked {
            background-color: #c68a4c !important;
            border-color: #c68a4c !important;
        }

        @media (max-width: 640px) {
            .custom-navbar {
                background-color: rgba(43, 30, 22, 0.98) !important;
                padding: 0.5rem 0;
            }
            .custom-navbar .nav-link {
                padding: 8px 12px !important;
                border-radius: 4px;
            }
            .portal-bg-wrapper {
                padding: 1.5rem 0.5rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark custom-navbar shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">Kanto Tea</a>
        
        <button class="navbar-toggler border-0 p-0" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#globalCafeNavbar" 
                aria-controls="globalCafeNavbar" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="custom-toggler-text">Menu</span>
        </button>

        <div class="collapse navbar-collapse" id="globalCafeNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.us.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.gallery.html">Menu Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="log.in.html">Portal Login</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="register.html">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="portal-bg-wrapper">
    <div class="card register-card-layout rounded-3 shadow-lg p-3 p-md-4">
        <div class="card-body">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold h4 text-dark mb-1">Create Member Account</h2>
                <p class="small text-secondary mb-0">Register your credentials down below to start pre-ordering menu profiles.</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault();">
                
                <div class="row g-3">
                    
                    <div class="col-12 col-md-8">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="floatingFullName" placeholder="Juan Dela Cruz" required>
                            <label for="floatingFullName">Full Name</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="floatingPhone" placeholder="09123456789" pattern="[0-9]{11}" title="Phone number must be exactly 11 numeric digits" required>
                            <label for="floatingPhone">Phone Number</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="floatingRegisterEmail" placeholder="name@example.com" required>
                            <label for="floatingRegisterEmail">Email Address</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="floatingPaymentSelect" aria-label="Preferred Payment Method" required>
                                <option value="" disabled selected>Choose your payment method...</option>
                                <option value="GCash">GCash</option>
                                <option value="Maya">Maya</option>
                                <option value="COD">Cash on Delivery (COD)</option>
                                <option value="Card">Credit / Debit Card</option>
                            </select>
                            <label for="floatingPaymentSelect">Preferred Payment</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="floatingRegisterPassword" placeholder="Password" required>
                            <label for="floatingRegisterPassword">Password</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirm Password" required>
                            <label for="floatingConfirmPassword">Confirm Password</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="p-3 bg-white border rounded-3">
                            <label class="form-label d-block fw-bold text-dark small mb-2">Gender Identification</label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genderRadioProfile" id="genderMale" value="male" checked>
                                    <label class="form-check-label small text-secondary" for="genderMale">Male</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genderRadioProfile" id="genderFemale" value="female">
                                    <label class="form-check-label small text-secondary" for="genderFemale">Female</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genderRadioProfile" id="genderOther" value="declined">
                                    <label class="form-check-label small text-secondary" for="genderOther">Prefer not to say</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsAgreementCheckbox" required>
                            <label class="form-check-label small text-secondary" for="termsAgreementCheckbox">
                                I verify that all data inputs match my official personal details accurately.
                            </label>
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn btn-caramel w-100 fw-bold py-2 mt-4 mb-3 shadow-sm">
                    Register Profile Account
                </button>

                <hr class="text-black-50 my-3">

                <div class="row g-2">
                    <div class="col-12 col-md-6 text-center text-md-start">
                        <p class="small text-secondary mb-0 py-2">Existing account profile? <a href="log.in.html" class="fw-bold text-decoration-none" style="color: #c68a4c;">Login here</a></p>
                    </div>
                    <div class="col-12 col-md-6 text-center text-md-end">
                        <a href="index.html" class="btn btn-outline-dark btn-sm px-4 fw-bold py-2 shadow-sm">
                            Back to Home
                        </a>
                    </div>
                </div>

            </form>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

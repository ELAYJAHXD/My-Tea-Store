<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Kanto Tea</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #faf6f0; 
            color: #3d2b1f; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .custom-navbar {
            background-color: #2b1e16 !important; 
            border-bottom: 3px solid #c68a4c;
        }

        .custom-navbar .navbar-brand {
            color: #c68a4c !important; 
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .custom-navbar .nav-link {
            color: #faf6f0 !important; 
            transition: color 0.2s ease-in-out;
            font-weight: 500;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #c68a4c !important; 
        }

        .portal-bg-wrapper {
            flex: 1;
            background-image: linear-gradient(rgba(43, 30, 22, 0.6), rgba(43, 30, 22, 0.75)), url('https://images.unsplash.com/photo-1442512595331-e89e73853f31?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card-transparent {
            background-color: rgba(255, 255, 255, 0.92) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(198, 138, 76, 0.3) !important;
            max-width: 420px;
            width: 100%;
        }

        .btn-caramel {
            background-color: #c68a4c;
            color: #ffffff;
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-caramel:hover {
            background-color: #ab733b;
            color: #ffffff;
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #c68a4c !important;
        }

        .form-control:focus {
            border-color: #c68a4c !important;
            box-shadow: 0 0 0 0.25rem rgba(198, 138, 76, 0.25) !important;
        }

        .link-caramel-hover:hover {
            color: #ab733b !important;
            text-decoration: underline !important;
        }

        @media (max-width: 640px) {
            .custom-navbar {
                background-color: rgba(43, 30, 22, 0.98) !important;
                padding: 0.5rem 0;
            }
            .custom-navbar .nav-link {
                padding: 8px 12px !important;
                border-radius: 4px;
            }
            .portal-bg-wrapper {
                padding: 1rem 0.75rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark custom-navbar shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">Kanto Tea</a>
        
        <button class="navbar-toggler border-0" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#globalCafeNavbar" 
                aria-controls="globalCafeNavbar" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="globalCafeNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="storewebsite.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.us.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.gallery.html">Menu Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="log.in.html">Portal Login</a></li>
                <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="portal-bg-wrapper">
    <div class="card login-card-transparent rounded-3 shadow-lg p-3 p-md-4">
        <div class="card-body">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold h4 text-dark mb-1">Portal Authentication</h2>
                <p class="small text-secondary mb-0">Access your table metrics and dynamic order options.</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault();">
                
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                    <label for="floatingEmail">Email Address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                    <label for="floatingPassword">Password</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMeCheckbox">
                        <label class="form-check-label small text-secondary" for="rememberMeCheckbox">
                            Remember Me
                        </label>
                    </div>
                    <a href="#" class="small text-decoration-none" style="color: #c68a4c;">Forgot Access?</a>
                </div>

                <button type="submit" class="btn btn-caramel w-100 fw-bold py-2 mb-3 shadow-sm">
                    Secure Access Login
                </button>

                <div class="text-center">
                    <a href="index.html" class="small text-decoration-none link-caramel-hover" style="color: #c68a4c; font-weight: 500;">
                        Back to Homepage
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
